name: generate stats graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: fetch stats svg
        run: |
          mkdir -p dist
          curl -sf "https://github-stats-extended.vercel.app/api?username=rgh9883&rank_icon=percentile&show_icons=true&include_all_commits=true&theme=github_dark" -o dist/stats.svg

      - name: push svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: stats-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
